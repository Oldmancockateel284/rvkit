name: Release Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: rvkit
            asset: rvkit-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: rvkit
            asset: rvkit-linux-aarch64
            cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: rvkit.exe
            asset: rvkit-windows-x86_64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: rvkit
            asset: rvkit-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: rvkit
            asset: rvkit-macos-aarch64

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross (Linux ARM only)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }} --package rvkit
      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} --package rvkit
      - name: Rename binary
        shell: bash
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset }}
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          draft: false
          prerelease: false
